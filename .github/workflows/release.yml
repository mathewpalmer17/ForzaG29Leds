name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.0)'
        required: true
      body:
        description: 'Release notes'
        required: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: git tag ${{ github.event.inputs.tag }} && git push origin ${{ github.event.inputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test --configuration Release

      - name: Publish self-contained
        run: dotnet publish ForzaG29Leds -c Release -o publish-sc

      - name: Publish framework-dependent
        run: dotnet publish ForzaG29Leds -c Release -p:FDPublish=true -o publish-fd

      - name: Rename SC exe
        run: Rename-Item publish-sc\ForzaG29Leds.exe ForzaG29Leds-SelfContained.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          body: ${{ github.event.inputs.body }}
          files: |
            publish-sc/ForzaG29Leds-SelfContained.exe
            publish-fd/ForzaG29Leds.exe
          draft: true
